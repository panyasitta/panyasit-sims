<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panyasit Interactive Simulations | สื่อการสอน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --secondary: #3b82f6; --accent: #f59e0b;
            --bg-color: #f8fafc; --text-main: #334155; --text-light: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }

        header { background-color: var(--primary); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--secondary); }
        
        .hero { background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%); color: white; text-align: center; padding: 4rem 1rem; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.1rem; max-width: 600px; margin: 0 auto 2rem auto; opacity: 0.9; }
        .search-bar { max-width: 500px; margin: 0 auto; display: flex; gap: 10px; }
        .search-bar input { flex: 1; padding: 12px 20px; border: none; border-radius: 30px; font-size: 1rem; outline: none; }

        .main-container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; min-height: 40vh; }
        .filters { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 2rem; }
        .filter-btn { background-color: white; border: 2px solid #e2e8f0; color: var(--text-main); padding: 8px 16px; border-radius: 20px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .filter-btn:hover { border-color: var(--secondary); color: var(--secondary); }
        .filter-btn.active { background-color: var(--secondary); color: white; border-color: var(--secondary); }

        .sim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .sim-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; color: inherit; display: flex; flex-direction: column; border: 1px solid #e2e8f0; }
        .sim-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        .card-img { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .bg-physics { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
        .bg-chemistry { background: linear-gradient(135deg, #f472b6, #ec4899); }
        .bg-biology { background: linear-gradient(135deg, #34d399, #10b981); }
        .bg-math { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
        
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.2rem; color: var(--primary); font-weight: 600; margin-bottom: 5px; }
        .card-subject { font-size: 0.9rem; font-weight: 500; margin-bottom: 10px; }
        .text-physics { color: #8b5cf6; }
        .text-chemistry { color: #ec4899; }
        .text-biology { color: #10b981; }
        .text-math { color: #3b82f6; }
        .card-desc { font-size: 0.9rem; color: var(--text-light); flex-grow: 1; }

        footer { background-color: var(--primary); color: white; text-align: center; padding: 2rem 1rem; margin-top: 4rem; }
        
        /* กรณีค้นหาไม่เจอ */
        .no-result { grid-column: 1 / -1; text-align: center; color: var(--text-light); padding: 2rem; font-size: 1.1rem; }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 10px; }
            .hero h1 { font-size: 2rem; }
            .search-bar { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🧬 <span>Panyasit</span> Sims</div>
    </header>

    <section class="hero">
        <h1>สื่อการทดลองเสมือนจริง</h1>
        <p>เรียนรู้วิทยาศาสตร์และคณิตศาสตร์อย่างสนุกสนาน ผ่านการลงมือทำด้วยตนเอง</p>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="ค้นหาสื่อการสอน (เช่น น้ำ, ไฟฟ้า)...">
        </div>
    </section>

    <div class="main-container">
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">ทั้งหมด</button>
            <button class="filter-btn" data-filter="physics">ฟิสิกส์</button>
            <button class="filter-btn" data-filter="chemistry">เคมี</button>
            <button class="filter-btn" data-filter="biology">ชีววิทยา</button>
            <button class="filter-btn" data-filter="math">คณิตศาสตร์</button>
        </div>

        <div class="sim-grid" id="simGrid"></div>
    </div>

    <footer>
        <div class="logo" style="justify-content: center; margin-bottom: 10px;">🧬 <span>Panyasit</span> Sims</div>
        <p>พัฒนาโดย นายปัญญสิษฐ พรมขำ (ครูปัญญสิษฐ)</p>
    </footer>

    <script>
        // =========================================================
        // 💾 ฐานข้อมูลสื่อการสอน: เพิ่ม-ลบ-แก้ไข การทดลองได้ที่นี่!
        // =========================================================
        const labDatabase = [
            {
                title: "การเปลี่ยนสถานะของน้ำ",
                subjectValue: "Science Physics", // หมวดหมู่สำหรับการกรอง (ใส่ได้หลายค่า เว้นวรรคเอา)
                subjectDisplay: "วิทยาศาสตร์ / ฟิสิกส์", // ข้อความที่จะโชว์ในการ์ด
                colorType: "physics", // ธีมสี: physics, chemistry, biology, math
                icon: "🧊💧💨",
                description: "ระยะทางและระยะห่างระหว่างสองตำแหน่งแตกต่างกันอย่างไร",
                link: "https://panyasitta.github.io/distance_lab_M2/"
            },
            {
                title: "การเปลี่ยนสถานะของน้ำ",
                subjectValue: "physics chemistry", // หมวดหมู่สำหรับการกรอง (ใส่ได้หลายค่า เว้นวรรคเอา)
                subjectDisplay: "ฟิสิกส์ / เคมี", // ข้อความที่จะโชว์ในการ์ด
                colorType: "physics", // ธีมสี: physics, chemistry, biology, math
                icon: "🧊💧💨",
                description: "ศึกษาอุณหภูมิและความร้อนแฝงจำเพาะขณะที่น้ำแข็งหลอมเหลวและกลายเป็นไอ พร้อมกราฟแสดงผลเรียลไทม์",
                link: "https://panyasitta.github.io/virtual-lab-science/"
            },
            {
                title: "กฎของโอห์ม (Ohm's Law)",
                subjectValue: "physics",
                subjectDisplay: "ฟิสิกส์",
                colorType: "physics",
                icon: "⚡💡",
                description: "ทดลองปรับค่าความต่างศักย์ (V) และความต้านทาน (R) เพื่อสังเกตผลกระทบต่อกระแสไฟฟ้า (I)",
                link: "#" // ลิงก์ที่ยังไม่ได้สร้าง ใส่ # ไว้ก่อน
            },
            {
                title: "การดุลสมการเคมี",
                subjectValue: "chemistry",
                subjectDisplay: "เคมี",
                colorType: "chemistry",
                icon: "⚖️🧪",
                description: "ฝึกสมองกับการเติมตัวเลขสัมประสิทธิ์เพื่อดุลสมการเคมี พร้อมตาชั่งจำลองจำนวนอะตอม",
                link: "#"
            },
            {
                title: "การสังเคราะห์ด้วยแสง",
                subjectValue: "biology",
                subjectDisplay: "ชีววิทยา",
                colorType: "biology",
                icon: "🌿☀️",
                description: "จำลองปัจจัยที่มีผลต่ออัตราการสังเคราะห์ด้วยแสง เช่น ความเข้มแสง และอุณหภูมิ",
                link: "#"
            }
            // 💡 ต้องการเพิ่มสื่อใหม่? ให้ใส่ลูกน้ำ (,) ด้านบน แล้วคัดลอกบล็อกปีกกามาวางต่อได้เลย!
        ];
        // =========================================================

        const grid = document.getElementById('simGrid');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const searchInput = document.getElementById('searchInput');

        // ฟังก์ชันสร้างการ์ดทั้งหมดจากฐานข้อมูล
        function renderCards(dataToRender) {
            grid.innerHTML = ''; // ล้างค่าเดิม
            
            if(dataToRender.length === 0) {
                grid.innerHTML = '<div class="no-result">🔍 ไม่พบสื่อการสอนที่คุณค้นหา ลองพิมพ์คำอื่นดูนะครับ</div>';
                return;
            }

            dataToRender.forEach(lab => {
                const cardHTML = `
                    <a href="${lab.link}" target="${lab.link === '#' ? '_self' : '_blank'}" class="sim-card" data-category="${lab.subjectValue}">
                        <div class="card-img bg-${lab.colorType}">${lab.icon}</div>
                        <div class="card-content">
                            <div class="card-subject text-${lab.colorType}">${lab.subjectDisplay}</div>
                            <div class="card-title">${lab.title}</div>
                            <div class="card-desc">${lab.description}</div>
                        </div>
                    </a>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // โหลดข้อมูลทั้งหมดตอนเปิดเว็บครั้งแรก
        renderCards(labDatabase);

        // ระบบกรองด้วยปุ่ม (Filter)
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // เปลี่ยนสีปุ่ม
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                searchInput.value = ''; // เคลียร์ช่องค้นหา

                const filterValue = btn.getAttribute('data-filter');
                
                if(filterValue === 'all') {
                    renderCards(labDatabase);
                } else {
                    const filteredData = labDatabase.filter(lab => lab.subjectValue.includes(filterValue));
                    renderCards(filteredData);
                }
            });
        });

        // ระบบค้นหาจากข้อความ (Search)
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            // รีเซ็ตปุ่มกรองเป็น 'ทั้งหมด'
            filterBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-filter="all"]').classList.add('active');

            const searchedData = labDatabase.filter(lab => 
                lab.title.toLowerCase().includes(query) || 
                lab.description.toLowerCase().includes(query)
            );
            
            renderCards(searchedData);
        });

    </script>
</body>
</html>
