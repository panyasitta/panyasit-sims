<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panyasit Interactive Simulations | สื่อการสอน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        physics: { light: '#a78bfa', dark: '#8b5cf6' },
                        chemistry: { light: '#f472b6', dark: '#ec4899' },
                        biology: { light: '#34d399', dark: '#10b981' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-slate-900 text-white py-4 px-6 md:px-12 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="text-2xl font-bold flex items-center gap-2 tracking-wide">
            🧬 <span class="text-blue-400">Panyasit</span> Sims
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-gradient-to-br from-slate-800 to-blue-600 text-white text-center py-16 px-4">
        <h1 class="text-3xl md:text-5xl font-bold mb-4 drop-shadow-md">สื่อการทดลองเสมือนจริง</h1>
        <p class="text-lg md:text-xl max-w-2xl mx-auto mb-8 text-blue-100 font-light">
            เรียนรู้วิทยาศาสตร์และคณิตศาสตร์ผ่านการลงมือทำด้วยตนเอง
        </p>
        <div class="max-w-xl mx-auto relative">
            <input type="text" id="searchInput" class="w-full pl-6 pr-4 py-4 rounded-full text-slate-800 font-medium shadow-lg focus:outline-none" placeholder="ค้นหาสื่อการสอน...">
        </div>
    </section>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="filterContainer">
            <button class="filter-btn active bg-blue-500 text-white px-6 py-2 rounded-full font-medium shadow-md" data-filter="all">ทั้งหมด</button>
            <button class="filter-btn bg-white text-slate-600 border border-slate-200 px-6 py-2 rounded-full font-medium hover:bg-slate-100" data-filter="physics">ฟิสิกส์</button>
            <button class="filter-btn bg-white text-slate-600 border border-slate-200 px-6 py-2 rounded-full font-medium hover:bg-slate-100" data-filter="chemistry">เคมี</button>
            <button class="filter-btn bg-white text-slate-600 border border-slate-200 px-6 py-2 rounded-full font-medium hover:bg-slate-100" data-filter="biology">ชีววิทยา</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="simGrid"></div>
    </main>

    <!-- Updated Footer -->
    <footer class="bg-slate-900 text-slate-300 text-center py-10 px-4 mt-auto border-t-4 border-blue-500">
        <p class="text-sm font-medium text-white mb-2">&copy; 2026 Panyasit Interactive Simulations. สงวนลิขสิทธิ์</p>
        <p class="font-light text-sm">พัฒนาโดย นายปัญญสิษฐ พรมขำ | โรงเรียนทุ่งเสลี่ยมชนูปถัมภ์</p>
    </footer>

    <script>
        const labDatabase = [
            {
                title: "กิจกรรม 4.2 ระยะทางและการกระจัด",
                subjectValue: "physics", 
                subjectDisplay: "ฟิสิกส์", 
                colorType: "physics", 
                icon: "🛣️",
                description: "เรียนรู้ความแตกต่างระหว่างระยะทางและการกระจัดผ่านการจำลองเส้นทาง",
                link: "https://panyasitta.github.io/distance_lab_M2/"
            },
            {
                title: "กิจกรรม 4.3 อัตราเร็วและความเร็ว",
                subjectValue: "physics", 
                subjectDisplay: "ฟิสิกส์", 
                colorType: "physics", 
                icon: "🏃‍♂️",
                description: "จำลองการเดินและคำนวณอัตราเร็ว/ความเร็ว พร้อมกระดานวาดเวกเตอร์และ AI ตรวจคำตอบ",
                link: "https://panyasitta.github.io/science_m2_act4_3/"
            },
            {
                title: "การเปลี่ยนสถานะของน้ำ (ความร้อน)",
                subjectValue: "physics chemistry",
                subjectDisplay: "ฟิสิกส์ / เคมี", 
                colorType: "chemistry", 
                icon: "🧊",
                description: "กิจกรรมเรื่องความร้อน: ศึกษาการเปลี่ยนสถานะจากของแข็งไปเป็นของเหลวและก๊าซพร้อมกราฟอุณหภูมิ",
                link: "https://panyasitta.github.io/virtual-lab-science/"
            }
        ];

        const grid = document.getElementById('simGrid');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const searchInput = document.getElementById('searchInput');

        function renderCards(data) {
            grid.innerHTML = data.map(lab => `
                <a href="${lab.link}" target="_blank" class="group bg-white rounded-2xl border border-slate-200 p-6 hover:shadow-xl transition-all">
                    <div class="text-5xl mb-4">${lab.icon}</div>
                    <span class="text-xs font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-700 uppercase">${lab.subjectDisplay}</span>
                    <h3 class="text-xl font-bold text-slate-800 mt-2 mb-2">${lab.title}</h3>
                    <p class="text-slate-500 text-sm">${lab.description}</p>
                </a>
            `).join('');
        }

        renderCards(labDatabase);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.className = 'filter-btn bg-white text-slate-600 border border-slate-200 px-6 py-2 rounded-full font-medium hover:bg-slate-100');
                btn.className = 'filter-btn active bg-blue-500 text-white px-6 py-2 rounded-full font-medium shadow-md';
                const f = btn.getAttribute('data-filter');
                renderCards(f === 'all' ? labDatabase : labDatabase.filter(l => l.subjectValue.includes(f)));
            });
        });

        searchInput.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderCards(labDatabase.filter(l => l.title.toLowerCase().includes(q) || l.description.toLowerCase().includes(q)));
        });
    </script>
</body>
</html>
